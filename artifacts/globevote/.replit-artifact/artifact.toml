kind = "web"
previewPath = "/"
title = "GlobeVote"
version = "1.0.0"
id = "artifacts/globevote"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25587

[services.development]
run = "pnpm --filter @workspace/globevote run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/globevote", "run", "build" ]
publicDir = "artifacts/globevote/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25587"
BASE_PATH = "/"
