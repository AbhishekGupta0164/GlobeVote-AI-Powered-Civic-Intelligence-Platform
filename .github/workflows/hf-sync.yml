name: Sync to Hugging Face space
on:
  push:
    branches: [main]
  # to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Install dependencies
        run: pip install -U "huggingface_hub[cli]"
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: huggingface-cli upload abhishek0164/globevote . . --repo-type=space --commit-message "Sync from GitHub" --exclude ".git/*" ".github/*"
