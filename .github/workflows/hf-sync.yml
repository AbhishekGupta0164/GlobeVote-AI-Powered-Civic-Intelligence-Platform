name: Sync to Hugging Face space
on:
  push:
    branches: [main]
  # to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: AbhishekGupta0164/GlobeVote-AI-Powered-Civic-Intelligence-Platform
          huggingface_repo_id: abhishek0164/globevote
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
